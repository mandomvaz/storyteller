<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryForge</title>
    <link rel="stylesheet" href="audio-recorder.module.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.0/dist/browser/signalr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr-protocol-msgpack@8.0.0/dist/browser/signalr-protocol-msgpack.min.js"></script>
</head>
<body style="font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f5f5f5; color: #333;">
    <div x-data="audioRecorder()" class="container">
        <h2 class="title">Tell your story</h2>

        <button
            class="micBtn"
            :class="state"
            @click="toggleRecording"
            :disabled="state !== 'idle' && state !== 'recording'"
            x-text="state === 'recording' ? '⏹' : '🎤'"
        ></button>

        <template x-if="state === 'loading'">
            <div class="status">
                <span class="spinner"></span> Sending...
            </div>
        </template>
        <template x-if="state === 'idle'">
            <div class="status">Tap to start recording</div>
        </template>
        <template x-if="state === 'recording'">
            <div class="status">Recording... tap to stop</div>
        </template>
        <template x-if="state === 'transcribing'">
            <div class="status">
                <span class="spinner"></span> Transcribing audio...
            </div>
        </template>
        <template x-if="state === 'writing'">
            <div class="status">
                <span class="spinner"></span> Writing your story...
            </div>
        </template>

        <template x-if="state === 'playing'">
            <div class="status" style="color: #27ae60;">Playing... ✨</div>
        </template>
        <template x-if="state === 'error'">
            <div class="status" style="color: #e74c3c;" x-text="errorMsg"></div>
        </template>
    </div>

    <script>
        function audioRecorder() {
            return {
                state: 'idle',
                errorMsg: '',
                mediaRecorder: null,
                audioChunks: [],
                playbackQueue: [],
                isPlaying: false,
                connectionId: null,
                connection: null,

                init() {
                    this.connection = new signalR.HubConnectionBuilder()
                        .withUrl("/storyHub")
                        .withHubProtocol(new signalR.protocols.msgpack.MessagePackHubProtocol())
                        .build();

                    this.connection.on("transcribing", () => {
                        this.state = 'transcribing';
                    });

                    this.connection.on("writing", () => {
                        this.state = 'writing';
                    });

                    this.connection.on("audioChunk", (data) => {
                        const blob = new Blob([data], { type: 'audio/wav' });
                        this.playbackQueue.push(blob);
                        if (!this.isPlaying) {
                            this.playNext();
                        }
                    });

                    this.connection.on("storyComplete", () => {
                        this.state = 'idle';
                    });

                    this.connection.on("error", (err) => {
                        const step = err.step ? err.step + ': ' : '';
                        this.errorMsg = step + err.message;
                        this.state = 'error';
                        setTimeout(() => {
                            this.state = 'idle';
                        }, 5000);
                    });

                    this.connection.start().then(() => {
                        this.connectionId = this.connection.connectionId;
                    });
                },

                playNext() {
                    if (this.playbackQueue.length === 0) {
                        this.isPlaying = false;
                        return;
                    }
                    this.isPlaying = true;
                    const blob = this.playbackQueue.shift();
                    const url = URL.createObjectURL(blob);
                    const audio = new Audio(url);
                    this.state = 'playing';
                    audio.play();
                    audio.onended = () => {
                        URL.revokeObjectURL(url);
                        this.playNext();
                    };
                },

                toggleRecording() {
                    if (this.state === 'recording') {
                        this.stopRecording();
                    } else {
                        this.startRecording();
                    }
                },

                startRecording() {
                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                        this.state = 'error';
                        this.errorMsg = 'Recording not supported in this browser.';
                        return;
                    }

                    navigator.mediaDevices.getUserMedia({ audio: true })
                        .then(stream => {
                            this.mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                            this.audioChunks = [];

                            this.mediaRecorder.ondataavailable = e => {
                                if (e.data.size > 0) this.audioChunks.push(e.data);
                            };

                            this.mediaRecorder.onstop = () => {
                                stream.getTracks().forEach(t => t.stop());
                                this.uploadAudio();
                            };

                            this.mediaRecorder.start();
                            this.state = 'recording';
                            this.errorMsg = '';
                        })
                        .catch(err => {
                            if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                                this.state = 'error';
                                this.errorMsg = 'Microphone access denied. Please enable it in your browser settings.';
                            } else {
                                this.state = 'error';
                                this.errorMsg = 'Could not access microphone.';
                            }
                        });
                },

                stopRecording() {
                    if (this.mediaRecorder && this.mediaRecorder.state === 'recording') {
                        this.mediaRecorder.stop();
                    }
                },

                uploadAudio() {
                    this.state = 'loading';

                    const blob = new Blob(this.audioChunks, { type: 'audio/webm' });
                    const formData = new FormData();
                    formData.append('audio', blob, 'recording.webm');
                    formData.append('connectionId', this.connectionId);

                    fetch('/api/stories/new', { method: 'POST', body: formData })
                        .then(async res => {
                            if (res.ok) {
                                const data = await res.json();
                                this.state = 'loading';
                            } else if (res.status === 413) {
                                this.state = 'error';
                                this.errorMsg = 'Recording is too large. Please try a shorter recording.';
                            } else if (res.status === 500) {
                                const err = await res.json().catch(() => ({ detail: 'Unknown error' }));
                                this.state = 'error';
                                this.errorMsg = err.detail || err.title || 'Server error';
                            } else {
                                this.state = 'error';
                                this.errorMsg = 'Failed to send recording. Please try again.';
                            }
                        })
                        .catch(() => {
                            this.state = 'error';
                            this.errorMsg = 'Network error. Please check your connection.';
                        });
                }
            };
        }
    </script>
</body>
</html>
